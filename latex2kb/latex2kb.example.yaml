# latex2kb 配置文件 / Configuration File
# 复制为 latex2kb.yaml 并按需修改 / Copy to latex2kb.yaml and customize
#
# 使用方法 / Usage:
#   latex2kb input/ output/ --config latex2kb.yaml
#
# 配置优先级 / Priority (high → low):
#   命令行参数 > 环境变量 > 配置文件 > 默认值
#   CLI flags > env vars > config file > defaults

# ──────────────────────────────────────────────
# 基本设置 / Basic settings
# ──────────────────────────────────────────────

# 主 .tex 文件名（留空则自动检测，仅 LaTeX 模式）
# main_tex: main.tex

# 源文件编码 / Source file encoding
encoding: utf-8

# 输出语言 / Output language for labels (Figure/图, Table/表, etc.)
# auto = follow source content, en = English, zh = Chinese
output_language: auto

# ──────────────────────────────────────────────
# LaTeX 管线设置 / LaTeX pipeline settings
# ──────────────────────────────────────────────

# 是否复制图片到输出目录
copy_images: true

# 是否启用 AI 图片描述（LaTeX 管线的可选功能）
image_descriptions: false

# ──────────────────────────────────────────────
# AI 提供商配置 / AI Provider Configuration
#
# 两个管线共用 provider 和 api_key
# Shared by both LaTeX and img2kb pipelines
# ──────────────────────────────────────────────

ai:
  # 提供商 / Provider: anthropic | openai | openai-compatible
  provider: anthropic

  # 模型名称 / Model name
  # Anthropic:          claude-haiku-4-5-20251001 (快且便宜)
  #                     claude-sonnet-4-6-20250514 (更强，推荐 img2kb)
  # OpenAI:             gpt-4o-mini (快且便宜)
  #                     gpt-4o (更强，推荐 img2kb)
  # OpenAI-compatible:  任意模型名
  model: claude-sonnet-4-6-20250514

  # API Key（推荐使用环境变量）
  # 支持的环境变量:
  #   ANTHROPIC_API_KEY / OPENAI_API_KEY / LATEX2KB_API_KEY
  # 也可以直接填写（不推荐提交到版本控制）:
  # api_key: your-api-key

  # 自定义 API 端点（仅 openai-compatible 模式需要）
  # base_url: https://your-api.example.com/v1

  # 请求超时（秒）
  timeout: 60

# ──────────────────────────────────────────────
# img2kb 管线设置 / img2kb pipeline settings
#
# 仅在输入为纯图片文件夹时生效
# Only used when input is a pure image folder
# ──────────────────────────────────────────────

img2kb:
  # Round 1: 单张图片分析的最大 token 数
  analysis_max_tokens: 2000

  # Round 2: 文档合成的最大 token 数
  synthesis_max_tokens: 8000

  # Round 2: 合成超时（秒，大量图片时可能需要更长）
  synthesis_timeout: 120
